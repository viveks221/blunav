version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - 9092:9092

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

  api:
    build: .
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/notifications_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    ports:
      - 3000:3000

  worker-high:
    build: .
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - NODE_ENV=development
      - QUEUE_TOPIC=notifications.high
    command: sh -c "bash scripts/wait-for-kafka.sh && npm run start-consumer"

  worker-low:
    build: .
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - NODE_ENV=development
      - QUEUE_TOPIC=notifications.low
    command: sh -c "bash scripts/wait-for-kafka.sh && npm run start-consumer"

  worker:
    build: .
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - NODE_ENV=development
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379
    command: npm run start-consumer
    restart: unless-stopped

volumes:
  pgdata:
